<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento UI Proportions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <nav class="navbar initial-visible">
    <a href="#" class="nav-item">Home</a>
    <a href="#" class="nav-item">Work</a>
    <a href="#" class="nav-item">Service</a>
    <a href="#" class="nav-item">Careers</a>
  </nav>

  <div class="bento-container">
    
    <!-- Left Column Main (Ratio Width: 476) -->
    <div class="col-left">
      
      <!-- Top Left Section (Ratio Height: 366) -->
      <div class="top-left">
        <div class="panel p1"></div>
        <div class="panel p2"></div>
      </div>
      
      <!-- Bottom Left Section (Ratio Height: ~313. 80 + gap + 217) -->
      <div class="bottom-left">
        <!-- Sub Col A (Ratio Width: 228) -->
        <div class="sub-col-a">
          <div class="panel p3"></div>
          <div class="panel p5"></div>
        </div>
        <!-- Sub Col B (Ratio Width: 231) -->
        <div class="sub-col-b">
          <div class="panel p4"></div>
          <div class="panel p6"></div>
        </div>
      </div>
      
    </div>

    <!-- Right Column Main (Ratio Width: 505) -->
    <div class="col-right">
      <div class="panel p7">
        <div class="p7-row-top">
          <div class="p7-block-l"></div>
          <div class="p7-block-m"></div>
          <div class="p7-block-m"></div>
          <div class="p7-stack">
             <div class="shape-circle"></div>
             <div class="shape-sq"></div>
             <div class="shape-sq"></div>
          </div>
        </div>
        <div class="p7-row-bot"></div>
      </div>
      <div class="panel p9"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
