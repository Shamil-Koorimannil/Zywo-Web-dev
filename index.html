<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento UI Proportions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <nav class="navbar initial-visible">
    <a href="#" class="nav-item">Home</a>
    <a href="#" class="nav-item">Work</a>
    <a href="#" class="nav-item">Service</a>
    <a href="#" class="nav-item">Careers</a>
  </nav>

  <div class="bento-container">
    
    <!-- Left Column Main (Ratio Width: 476) -->
    <div class="col-left">
      
      <!-- Top Left Row (Ratio Height: 366) -->
      <div class="top-left">
        <div class="panel p1">
          <div class="p1-img"></div>
          <div class="p1-img"></div>
          <div class="p1-img"></div>
          <div class="p1-img"></div>
          <div class="p1-img"></div>
        </div>
        <div class="panel p2">
          <div class="p2-top">
            <div class="p2-logo"></div>
            <a href="#" class="p2-btn">Blogs</a>
          </div>
          <div class="p2-bottom">
            <div class="p2-tagline-1"></div>
            <div class="p2-tagline-2"></div>
          </div>
        </div>
      </div>
      
      <!-- Bottom Left Section (Ratio Height: ~313. 80 + gap + 217) -->
      <div class="bottom-left">
        <!-- Sub Col A (Ratio Width: 228) -->
        <div class="sub-col-a">
          <div class="panel p3">
            <div class="p3-img"></div>
            <div class="p3-text">Team</div>
            <div class="p3-img"></div>
          </div>
          <div class="panel p5">
            <div class="p5-top">
              <div class="p5-title-group">
                <div class="p5-logo"></div>
                <div class="p5-name"></div>
              </div>
              <div class="p5-dot"></div>
            </div>
            <div class="p5-desc">
              <div class="p5-line-1"></div>
              <div class="p5-line-2"></div>
              <div class="p5-line-3"></div>
            </div>
          </div>
        </div>
        <!-- Sub Col B (Ratio Width: 231) -->
        <div class="sub-col-b">
          <div class="panel p4">
            <div class="p4-top">
              <div class="p4-profile"></div>
              <div class="p4-quote"></div>
            </div>
            <div class="p4-bottom">
              <div class="p4-name"></div>
              <div class="p4-role"></div>
              <div class="p4-test"></div>
            </div>
          </div>
          <div class="panel p6">
            <div class="client-logo">Brand 1</div>
          </div>
        </div>
      </div>
      
    </div>

    <!-- Right Column Main (Ratio Width: 505) -->
    <div class="col-right">
      <div class="panel p7">
        <div class="p7-row-top">
          <div class="p7-block-l"></div>
          <div class="p7-block-m"></div>
          <div class="p7-block-m"></div>
          <div class="p7-stack">
             <div class="shape-circle"></div>
             <div class="shape-sq"></div>
             <div class="shape-sq"></div>
          </div>
        </div>
        <div class="p7-row-bot"></div>
      </div>
      <div class="panel p9">
        <div class="p9-left">
          <div class="p9-camp-img"></div>
        </div>
        <div class="p9-right">
          <div class="p9-camp-copy"></div>
          <div class="p9-camp-desc">
            <div class="p9-desc-1"></div>
            <div class="p9-desc-2"></div>
          </div>
          <div class="p9-camp-dots">
            <div class="p9-dot-tiny"></div>
            <div class="p9-dot-active"></div>
            <div class="p9-dot-tiny"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
